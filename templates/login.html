<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login | RP Hub</title>

    <link
        rel="icon"
        type="image/png"
        href="{{ url_for('static', filename='images/rp-hub-icon.png') }}"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='login.css') }}"
    >
</head>

<body class="login-page">
    <main class="login-content">
        <section
            class="login-panel"
            aria-labelledby="login-title"
        >
            <h1
                class="login-title"
                id="login-title"
            >
                Login
            </h1>

            {% if error %}
                <p
                    class="login-error"
                    role="alert"
                >
                    {{ error }}
                </p>
            {% endif %}

            <form
                class="login-form"
                method="POST"
            >
                <div class="login-field">
                    <label for="username">
                        User
                    </label>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>

                <div class="login-field">
                    <label for="password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button
                    class="login-submit"
                    type="submit"
                    aria-label="Log in"
                >
                    <img
                        src="{{ url_for(
                            'static',
                            filename='images/login-icon.png'
                        ) }}"
                        alt=""
                    >
                </button>
            </form>
        </section>
    </main>
</body>
</html>
