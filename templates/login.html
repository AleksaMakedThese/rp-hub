{% extends "base.html" %}

{% block title %}
    Login | RP Hub
{% endblock %}

{% block content %}
    <section class="login-section">
        <h1>Login</h1>

        {% if error %}
            <p class="form-error">
                {{ error }}
            </p>
        {% endif %}

        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="username">
                    Username
                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit">
                Login
            </button>
        </form>
    </section>
{% endblock %}
