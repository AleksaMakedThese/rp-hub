<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
            RP Hub
        {% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <header class="site-header">
        <a class="site-logo" href="{{ url_for('rooms') }}">
            RP Hub
        </a>

       <nav class="site-navigation">
    <a href="{{ url_for('rooms') }}">
        Rooms
    </a>

    {% if g.user %}
        <span class="current-user">
            {{ g.user.username }}
        </span>

        <form
            method="POST"
            action="{{ url_for('logout') }}"
            class="logout-form"
        >
            <button
                type="submit"
                class="navigation-button"
            >
                Logout
            </button>
        </form>
    {% else %}
        <a href="{{ url_for('login') }}">
            Login
        </a>
    {% endif %}
</nav>
    </header>

    <main class="page-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <p>RP Hub</p>
    </footer>
</body>
</html>
