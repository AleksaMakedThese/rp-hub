<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Rooms | RP Hub</title>

    <link
        rel="icon"
        type="image/png"
        href="{{ url_for('static', filename='images/rp-hub-icon.png') }}"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='rooms.css') }}"
    >
</head>

<body class="rooms-page">
    <header class="rooms-navigation">
        <a
            class="rooms-home-link"
            href="{{ url_for('home') }}"
            aria-label="Back to RP Hub home page"
        >
            <img
                src="{{ url_for(
                    'static',
                    filename='images/rp-hub-icon.png'
                ) }}"
                alt="RP Hub"
            >
        </a>

        <a
            class="rooms-login-link"
            href="{{ url_for('login') }}"
            aria-label="Login"
        >
            <img
                src="{{ url_for(
                    'static',
                    filename='images/login-icon.png'
                ) }}"
                alt=""
            >
        </a>
    </header>

    <main class="rooms-content">
        <nav
            class="rooms-list"
            aria-label="Roleplay rooms"
        >
            {% for room_id, room in rooms.items() %}
                <a
                     class="room-portal room-portal-{{ room_id }}"
                     href="{{ url_for('room', room_id=room_id) }}"
>
                    <img
                        class="room-arc"
                        src="{{ url_for(
                            'static',
                            filename='images/room-arc.png'
                        ) }}"
                        alt=""
                    >

                    <span class="room-name">
                        {{ room.title }}
                    </span>
                </a>
            {% endfor %}
        </nav>
    </main>
</body>
</html>
